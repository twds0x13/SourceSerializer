name: Bug Report
description: Report a bug in SourceSerializer
labels: ["bug"]
body:
  - type: textarea
    attributes:
      label: Describe the bug
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Reproduction
      description: Minimal code to reproduce the issue
      render: csharp
    validations:
      required: true
  - type: input
    attributes:
      label: Version
      description: SourceSerializer version (from package.json)
    validations:
      required: true
