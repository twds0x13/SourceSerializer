name: Feature Request
description: Propose a new feature for SourceSerializer
labels: ["enhancement"]
body:
  - type: textarea
    attributes:
      label: Problem
      description: What problem does this feature solve?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Proposed solution
      description: Describe the feature you'd like to see
    validations:
      required: true
